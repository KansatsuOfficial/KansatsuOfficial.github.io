name: Update Fans List

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: update-fans-list
  cancel-in-progress: true

jobs:
  update-fans:
    runs-on: ubuntu-latest
    env:
      BILIBILI_UID: 3690985523514020
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh fan data
        run: node scripts/update-fans.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- fans.txt fans.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fans.txt fans.json
          git commit -m "chore: update fans list"
          git push
